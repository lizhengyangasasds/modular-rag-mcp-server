# Modular RAG MCP Server - Configuration
# Supported providers: DeepSeek (deepseek-v4-flash / deepseek-v4-pro),
#   OpenAI (gpt-4o / gpt-4o-mini), Azure OpenAI, Ollama

# =============================================================================
# LLM Configuration → 你的AI大脑
# =============================================================================
llm:
  provider: "deepseek"
  model: "deepseek-v4-flash"          # 推荐：deepseek-v4-flash（快速）/ deepseek-v4-pro（高精度）
  base_url: "https://api.deepseek.com"
  api_key: "${DEEPSEEK_API_KEY}"       # 从 .env 读取，绝不硬编码
  temperature: 0.0
  max_tokens: 4096

# =============================================================================
# Embedding Configuration → 本地文本向量化（免费、不上传文档）
# =============================================================================
embedding:
  provider: "huggingface"
  model: "all-MiniLM-L6-v2"
  dimensions: 384
  device: "cpu"

# =============================================================================
# Vision LLM Configuration (for Image Captioning in PDFs)
# =============================================================================
vision_llm:
  enabled: false                       # 设为 true 并配置 API_KEY 以启用多模态
  provider: "openai"
  model: "gpt-4o"
  api_key: "${VISION_LLM_API_KEY}"
  max_image_size: 2048

# =============================================================================
# Vector Store Configuration → 本地数据仓库
# =============================================================================
vector_store:
  provider: "chroma"
  persist_directory: "./data/db/chroma"
  collection_name: "knowledge_hub"

# =============================================================================
# Retrieval Configuration
# =============================================================================
retrieval:
  dense_top_k: 20
  sparse_top_k: 20
  fusion_top_k: 10
  rrf_k: 60

# =============================================================================
# Rerank Configuration
# =============================================================================
rerank:
  enabled: false                      # 设为 true 启用 Cross-Encoder 重排序（增加延迟）
  provider: "none"
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k: 5

# =============================================================================
# Evaluation Configuration
# =============================================================================
evaluation:
  enabled: false                      # 设为 true 启用评估（需准备测试集）
  provider: "custom"
  metrics:
    - "hit_rate"
    - "mrr"
    - "faithfulness"

# =============================================================================
# Observability Configuration
# =============================================================================
observability:
  log_level: "INFO"
  trace_enabled: true
  trace_file: "./logs/traces.jsonl"
  structured_logging: true

# =============================================================================
# Ingestion Configuration
# =============================================================================
ingestion:
  chunk_size: 1000
  chunk_overlap: 200
  splitter: "recursive"
  batch_size: 100

  chunk_refiner:
    use_llm: true

  metadata_enricher:
    use_llm: true
